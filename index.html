<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analítico por Unidade Médica e Procedimento</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  body { margin: 0; background: #ece9e4; padding: 18px; }
  .pbx { --ac:#E8830F; --ac-d:#cf7400; --ac-soft:rgba(232,131,15,.14); --ac-tint:#fdf1e3; --ac-text:#9a5a06;
         font-family: "Segoe UI", system-ui, sans-serif; color: #2b2a28; background: #f4f2ef; border: 1px solid #e3ded7; border-radius: 14px; overflow: hidden; max-width: 1180px; margin: 0 auto; box-shadow: 0 10px 30px rgba(80,50,10,.08); }
  .pbx * { box-sizing: border-box; }
  .pbx .gate { min-height: 520px; display: flex; align-items: center; justify-content: center; background: radial-gradient(120% 120% at 50% 0%, #fff 0%, #faf7f2 60%, #f4ede2 100%); padding: 24px; }
  .pbx .gate-card { width: 340px; background: #fff; border: 1px solid #efe7da; border-radius: 16px; padding: 32px 28px; box-shadow: 0 12px 34px rgba(120,70,10,.12); text-align: center; }
  .pbx .gate-card img.logo { width: 170px; height: auto; margin: 0 auto 6px; display: block; }
  .pbx .gate-sub { color: #8a8378; font-size: 12.5px; margin: 0 0 18px; }
  .pbx label { display: block; font-size: 12px; color: #8a8378; margin: 12px 0 5px; text-align: left; }
  .pbx input { width: 100%; height: 40px; padding: 0 12px; border: 1px solid #d9d2c7; border-radius: 9px; font-size: 14px; background: #fff; color: #2b2a28; transition: border-color .15s, box-shadow .15s; }
  .pbx input:focus { outline: none; border-color: var(--ac); box-shadow: 0 0 0 3px var(--ac-soft); }
  .pbx .btn { width: 100%; height: 42px; margin-top: 20px; background: var(--ac); color: #fff; border: 0; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s, transform .08s; }
  .pbx .btn:hover { background: var(--ac-d); }
  .pbx .btn:active { transform: scale(.985); }
  .pbx .btn:disabled { opacity: .6; cursor: default; }
  .pbx .err { color: #b3261e; font-size: 12.5px; margin-top: 10px; min-height: 16px; }
  .pbx .hint { margin-top: 16px; font-size: 12px; color: #a59c8d; border-top: 1px solid #f1ece3; padding-top: 13px; }
  .pbx .hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 18px; background: #fff; border-bottom: 1px solid #eee6da; flex-wrap: wrap; }
  .pbx .hdr-l { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .pbx .hdr-l img.logo { height: 34px; width: auto; }
  .pbx .hdr-l b { font-size: 14.5px; font-weight: 500; color: #4a443c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pbx .hdr-r { display: flex; align-items: center; gap: 8px; }
  .pbx .chip { display: inline-flex; align-items: center; gap: 7px; background: #faf7f2; border: 1px solid #eee6da; border-radius: 22px; padding: 5px 12px 5px 6px; font-size: 13px; }
  .pbx .chip .av { width: 24px; height: 24px; border-radius: 50%; background: var(--ac); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .pbx .lo { background: none; border: 0; color: #8a8378; cursor: pointer; font-size: 18px; padding: 5px; border-radius: 8px; transition: background .15s, color .15s; }
  .pbx .lo:hover { color: var(--ac); background: var(--ac-soft); }
  .pbx .inbox-ico { display: inline-block; position: relative; width: 20px; height: 17px; vertical-align: middle; }
  .pbx .inbox-ico::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 11px; border: 1.8px solid #E8830F; border-radius: 2px; }
  .pbx .inbox-ico::after { content: ''; position: absolute; top: 0; left: 4px; right: 4px; height: 10px; border: 1.8px solid #E8830F; border-bottom: 0; border-radius: 2px 2px 0 0; background: #fff; }
  @keyframes inbox-pulse { 0%,100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(232,131,15,0); } 50%{ transform:scale(1.13); box-shadow:0 0 0 5px rgba(232,131,15,.18); } }
  .pbx .lo-pulse { animation: inbox-pulse 2.2s ease-in-out infinite; border-radius: 8px; }
  .pbx .fbar { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; padding: 12px 18px; background: #fcfbf9; border-bottom: 1px solid #eee6da; }
  .pbx .fld { display: flex; flex-direction: column; gap: 4px; }
  .pbx .fld > span { font-size: 11px; color: #a59c8d; font-weight: 500; }
  .pbx select.uni, .pbx input.dt { height: 34px; border: 1px solid #d9d2c7; border-radius: 9px; font-size: 13px; padding: 0 10px; background: #fff; color: #2b2a28; font-family: inherit; width: auto; }
  .pbx .mfin { width: 220px; height: 34px; border: 1px solid #d9d2c7; border-radius: 9px; font-size: 13px; padding: 0 10px; background: #fff; color: #2b2a28; }
  .pbx .lock { height: 34px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: #4a443c; padding: 0 6px; }
  .pbx .daterange { display: flex; align-items: center; gap: 7px; }
  .pbx .daterange small { color: #a59c8d; }
  .pbx .canvas { padding: 16px 18px; }
  .pbx .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(195px,1fr)); gap: 12px; margin-bottom: 16px; }
  .pbx .kpi .ic { font-size: 22px; line-height: 1; }
  .pbx .kpi { background: #fff; border: 1px solid #eee6da; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 13px; box-shadow: 0 1px 3px rgba(80,50,10,.05); transition: transform .12s, box-shadow .12s; }
  .pbx .kpi:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(80,50,10,.09); }
  .pbx .kpi .ic { width: 42px; height: 42px; border-radius: 11px; background: var(--ac-soft); color: var(--ac); display: flex; align-items: center; justify-content: center; font-size: 21px; flex-shrink: 0; }
  .pbx .kpi .val { font-size: 21px; font-weight: 600; color: #2b2a28; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .pbx .kpi .lbl { font-size: 12px; color: #8a8378; margin-top: 3px; }
  .pbx .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px,1fr)); gap: 16px; margin-bottom: 16px; }
  .pbx .visual { background: #fff; border: 1px solid #eee6da; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(80,50,10,.05); margin-bottom: 16px; }
  .pbx .grid2 .visual { margin-bottom: 0; }
  .pbx .visual-h { font-size: 14px; font-weight: 500; color: #4a443c; padding: 13px 16px 9px; display: flex; align-items: center; gap: 7px; }
  .pbx .visual-h i { color: var(--ac); font-size: 16px; }
  .pbx .visual-h small { color: #a59c8d; font-weight: 400; }
  .pbx table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .pbx thead th { text-align: left; font-size: 11px; color: #a59c8d; font-weight: 500; padding: 7px 14px; border-bottom: 1px solid #eee6da; }
  .pbx thead th.num { text-align: right; }
  .pbx tbody td { padding: 0 14px; height: 30px; border-bottom: 1px solid #f5f1ea; }
  .pbx tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .pbx tbody tr:hover td { background: #fdfbf8; }
  .pbx .barcell { position: relative; }
  .pbx .bar { position: absolute; left: 0; top: 5px; bottom: 5px; background: var(--ac-soft); border-radius: 3px; }
  .pbx .barcell span { position: relative; }
  .pbx .pct { color: var(--ac-text); font-weight: 600; }
  .pbx .total td { border-top: 1.5px solid #e3ded7; border-bottom: 0; font-weight: 600; background: #fcfaf7; height: 34px; }
  .pbx tr.grp { cursor: pointer; }
  .pbx tr.grp td { font-weight: 500; border-top: 1px solid #f1ece3; }
  .pbx tr.grp td i { color: var(--ac); font-size: 14px; margin-right: 6px; }
  .pbx tr.grp:hover td { background: #fdf6ee; }
  .pbx td.ind { padding-left: 32px; color: #8a8378; }
  .pbx tr.day td { color: #8a8378; height: 28px; }
  .pbx .subh { font-size: 12px; font-weight: 600; color: #6e675c; padding: 11px 14px 4px; border-top: 1px solid #f3eee6; }
  .pbx .subh small { font-weight: 400; color: #b8ad9c; }
  .pbx .mchip { font-size: 12px; padding: 6px 12px; border: 1px solid #d9d2c7; border-radius: 18px; cursor: pointer; color: #6e675c; background: #fff; transition: all .12s; }
  .pbx .mchip:hover { border-color: var(--ac); }
  .pbx .mchip.on { background: var(--ac-tint); border-color: var(--ac); color: var(--ac-text); font-weight: 500; }
  .pbx .months { display: flex; gap: 6px; flex-wrap: wrap; }
  .pbx .seg { display: flex; border: 1px solid #d9d2c7; border-radius: 9px; overflow: hidden; height: 34px; }
  .pbx .seg button { border: 0; background: #fff; color: #6e675c; font-size: 12.5px; padding: 0 14px; cursor: pointer; border-right: 1px solid #e7e0d6; font-family: inherit; transition: background .12s; }
  .pbx .seg button:last-child { border-right: 0; }
  .pbx .seg button.on { background: var(--ac); color: #fff; font-weight: 500; }
  .pbx .tabs { display: flex; gap: 4px; padding: 8px 14px; background: #fff; border-top: 1px solid #eee6da; flex-wrap: wrap; }
  .pbx .tab { font-size: 12.5px; color: #6e675c; padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: background .12s; }
  .pbx .tab:hover { background: #faf7f2; }
  .pbx .tab.active { background: var(--ac-tint); color: var(--ac-text); font-weight: 500; }
  .pbx .chartbox { position: relative; padding: 4px 12px 14px; }
  .pbx .body { display: flex; align-items: stretch; }
  .pbx .side { width: 234px; flex-shrink: 0; background: #fff; border-right: 1px solid #eee6da; padding: 14px 12px; }
  .pbx .side-t { font-size: 11px; font-weight: 600; color: #b8ad9c; text-transform: uppercase; letter-spacing: .5px; padding: 4px 12px 9px; }
  .pbx .nav { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 10px; font-size: 13.5px; color: #6e675c; cursor: pointer; transition: background .12s, color .12s; margin-bottom: 3px; }
  .pbx .nav i { font-size: 19px; color: #b8ad9c; }
  .pbx .nav:hover { background: #faf7f2; }
  .pbx .nav.active { background: var(--ac-tint); color: var(--ac-text); font-weight: 500; }
  .pbx .nav.active i { color: var(--ac); }
  .pbx .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  @media (max-width: 760px) {
    .pbx .body { flex-direction: column; }
    .pbx .side { width: auto; display: flex; gap: 4px; overflow-x: auto; border-right: 0; border-bottom: 1px solid #eee6da; padding: 8px 10px; }
    .pbx .side-t { display: none; }
    .pbx .nav { white-space: nowrap; margin-bottom: 0; }
  }
  @media (max-width: 560px) {
    body { padding: 8px; }
    .pbx .hdr-l b { font-size: 12.5px; white-space: normal; }
    .pbx .canvas { padding: 12px; }
  }
</style>
</head>
<body>
<div class="pbx" id="pbx-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const SUPA_URL = "https://bnzkiajazygdzjffxfef.supabase.co";
  const SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuemtpYWphenlnZHpqZmZ4ZmVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDg4MTgsImV4cCI6MjA5Mjg4NDgxOH0.ij0-Vj1iWbp8sUJJ1_0UiFrAIegM0zf1u4M4sT6FVWk";
  const DOMINIO = "@skinlaser.com.br";
  const AC = "#E8830F";
  const sb = supabase.createClient(SUPA_URL, SUPA_ANON);
  const { useState, useEffect } = React;
  const html = htm.bind(React.createElement);

  const brl = v => "R$ " + v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
  const brl0 = v => "R$ " + Math.round(v).toLocaleString("pt-BR");
  const pct = p => p.toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1}) + "%";
  const MLBL = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const fmtD = s => { const p = s.split("-").map(Number); const dt = new Date(p[0],p[1]-1,p[2]); const wd = ["dom","seg","ter","qua","qui","sex","sáb"][dt.getDay()]; return wd+" "+String(p[2]).padStart(2,"0")+"/"+String(p[1]).padStart(2,"0"); };
  const ddmm = s => s.slice(8,10)+"/"+s.slice(5,7);
  const monthLbl = ym => { const [y,m] = ym.split("-"); return MLBL[+m-1]+"/"+y.slice(2); };
  const periodDays = (pmode, months, de, ate, calMin, calMax) => {
    const out = [];
    const push = (f0, t0) => {
      let f = f0 < calMin ? calMin : f0, t = t0 > calMax ? calMax : t0;
      if(f > t) return;
      let d = new Date(f+"T00:00:00"); const end = new Date(t+"T00:00:00");
      while(d <= end){ out.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")); d.setDate(d.getDate()+1); }
    };
    if(pmode === "mes"){ months.forEach(ym => { const [y,m] = ym.split("-").map(Number); const last = new Date(y, m, 0).getDate(); push(ym+"-01", ym+"-"+String(last).padStart(2,"0")); }); }
    else { push(de, ate); }
    return out;
  };

  async function fetchAll(view){
    const out = []; let from = 0; const size = 1000;
    while(true){
      const { data, error } = await sb.from(view).select("*").range(from, from+size-1);
      if(error) throw error;
      out.push(...data);
      if(data.length < size) break;
      from += size;
    }
    return out;
  }
  async function loadStore(user){
    const [dia, prof, grupo, pacote, profproc] = await Promise.all([
      fetchAll("vw_dia"), fetchAll("vw_prof_dia"), fetchAll("vw_grupo_dia"),
      fetchAll("vw_pacote_dia").catch(() => []),
      fetchAll("vw_prof_proc").catch(() => [])
    ]);
    let dRows = dia, pRows = prof, gRows = grupo, kRows = pacote, ppRows = profproc;
    if(!user.isMaster){
      dRows = dRows.filter(r => r.unidade_nome === user.unidade);
      pRows = pRows.filter(r => r.unidade_nome === user.unidade);
      gRows = gRows.filter(r => r.unidade_nome === user.unidade);
      kRows = kRows.filter(r => r.unidade_nome === user.unidade);
      ppRows = ppRows.filter(r => r.unidade_nome === user.unidade);
    }
    const units = [...new Set(dRows.map(r => r.unidade_nome))].sort();
    const uidx = {}; units.forEach((u,i) => uidx[u] = i);
    const du = dRows.map(r => [uidx[r.unidade_nome], r.dia, Number(r.valor), Number(r.qtd)]);
    const dm = {}; pRows.forEach(r => { const k = r.profissional; (dm[k] = dm[k]||[]).push([uidx[r.unidade_nome], r.dia, Number(r.valor)]); });
    const dg = {}; gRows.forEach(r => { const k = r.grupo || "(sem grupo)"; (dg[k] = dg[k]||[]).push([uidx[r.unidade_nome], r.dia, Number(r.valor)]); });
    const dp = {}; kRows.forEach(r => { const k = r.pacote || "(sem pacote)"; (dp[k] = dp[k]||[]).push([uidx[r.unidade_nome], r.dia, Number(r.valor)]); });
    const dmd = {}; ppRows.forEach(r => { const nom = r.medico||r.profissional; const k = nom+"||"+r.dia; (dmd[k] = dmd[k]||[]).push({ proc: r.procedimento, valor: Number(r.valor), un: uidx[r.unidade_nome] }); });
    // dmp: médico → { proc → valor } (para cross-display sutil)
    const dmp = {}; ppRows.forEach(r => { const nom = r.medico||r.profissional; if(!dmp[nom]) dmp[nom]={}; const p=r.procedimento; dmp[nom][p]=(dmp[nom][p]||0)+Number(r.valor); });
    // dpm: procedimento → [médicos] (para cross-display em grupos – usa vw_prof_proc)
    const dpg = {}; ppRows.forEach(r => { const nom = r.medico||r.profissional; const p=r.procedimento; (dpg[p]=dpg[p]||new Set()).add(nom); });
    const dates = du.map(r => r[1]).sort();
    const months = [...new Set(dates.map(d => d.slice(0,7)))].sort().map(ym => [ym, monthLbl(ym)]);
    const dmin = dates[0]||"", dmax = dates[dates.length-1]||"";
    const calMin = (dmin ? dmin.slice(0,4) : "2026") + "-01-01";
    return { units, du, dm, dg, dp, dmd, dmp, dpg, dmin, dmax, calMin, calMax: dmax, months };
  }

  function buildPred(unis, pmode, months, de, ate){
    return (u, d) => {
      if(unis.length > 0 && !unis.includes(u)) return false;
      if(pmode === "mes") return months.includes(d.slice(0,7));
      return d >= de && d <= ate;
    };
  }
  function MultiSelect({ options, value, onChange, placeholder, searchable }){
    const [open, setOpen] = useState(false);
    const [q, setQ] = useState("");
    const ref = React.useRef(null);
    useEffect(() => {
      if(!open){ setQ(""); return; }
      const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
      document.addEventListener("mousedown", h);
      return () => document.removeEventListener("mousedown", h);
    }, [open]);
    const toggle = v => onChange(value.includes(v) ? value.filter(x => x !== v) : [...value, v]);
    const filtered = searchable && q.trim() ? options.filter(([,lbl2]) => lbl2.toLowerCase().includes(q.trim().toLowerCase())) : options;
    const allOn = value.length === options.length;
    const lbl = value.length === 0 ? placeholder : allOn ? "Todas" : value.length + " selecionado(s)";
    return html`<div style=${{position:"relative",display:"inline-block"}} ref=${ref}>
      <button onClick=${() => setOpen(o => !o)} style=${{height:"34px",border:"1px solid #d9d2c7",borderRadius:"9px",fontSize:"13px",padding:"0 10px 0 12px",background:"#fff",color:value.length?"#2b2a28":"#a59c8d",fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",gap:"8px",minWidth:"180px",justifyContent:"space-between",whiteSpace:"nowrap"}}>
        <span>${lbl}</span><i class=${"ti ti-chevron-"+(open?"up":"down")} style=${{fontSize:"12px",color:"#a59c8d",flexShrink:0}}></i>
      </button>
      ${open ? html`<div style=${{position:"absolute",top:"38px",left:"0",background:"#fff",border:"1px solid #e3ded7",borderRadius:"10px",boxShadow:"0 8px 24px rgba(80,50,10,.14)",zIndex:200,minWidth:"210px",maxHeight:"320px",display:"flex",flexDirection:"column",padding:"0"}}>
        ${searchable ? html`<div style=${{padding:"8px 10px",borderBottom:"1px solid #f3eee6",flexShrink:0}}>
          <input autoFocus value=${q} onChange=${e => setQ(e.target.value)} placeholder="Buscar procedimento…" style=${{width:"100%",height:"30px",border:"1px solid #d9d2c7",borderRadius:"7px",padding:"0 10px",fontSize:"12.5px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} onClick=${e => e.stopPropagation()} />
        </div>` : null}
        <div style=${{overflowY:"auto",flex:1,padding:"4px 0"}}>
          ${!q.trim() ? html`<label style=${{display:"flex",alignItems:"center",gap:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"12.5px",color:"#6e675c",borderBottom:"1px solid #f3eee6",fontWeight:500}}>
            <input type="checkbox" checked=${allOn} onChange=${() => onChange(allOn ? [] : options.map(o => o[0]))} style=${{accentColor:AC,cursor:"pointer",width:"14px",height:"14px"}} />
            Todos
          </label>` : null}
          ${filtered.length === 0 ? html`<div style=${{padding:"10px 14px",fontSize:"12px",color:"#b8ad9c"}}>Nenhum resultado</div>` : null}
          ${filtered.map(([v,lbl2]) => html`<label key=${v} style=${{display:"flex",alignItems:"center",gap:"8px",padding:"6px 14px",cursor:"pointer",fontSize:"12.5px",color:"#2b2a28"}}>
            <input type="checkbox" checked=${value.includes(v)} onChange=${() => toggle(v)} style=${{accentColor:AC,cursor:"pointer",width:"14px",height:"14px"}} />
            ${lbl2}
          </label>`)}
        </div>
      </div>` : null}
    </div>`;
  }
  function aggDaily(store, pred){
    const m = {}, q = {};
    store.du.forEach(([u,d,vf,qt]) => { if(pred(u,d)){ m[d]=(m[d]||0)+vf; q[d]=(q[d]||0)+qt; } });
    return Object.keys(m).sort().reverse().map(d => [d, m[d], q[d]]);
  }
  function aggEntity(data, pred){
    return Object.entries(data).map(([name, arr]) => {
      const days = {};
      arr.forEach(([u,d,vf]) => { if(pred(u,d)) days[d]=(days[d]||0)+vf; });
      const dl = Object.keys(days).sort().reverse().map(d => [d, days[d]]);
      return { name, days: dl, total: dl.reduce((s,r) => s+r[1], 0) };
    }).filter(e => e.total > 0).sort((a,b) => b.total - a.total);
  }

  function Chartjs({ labels, data, horizontal, height }){
    const ref = React.useRef(null), inst = React.useRef(null);
    const sig = labels.join("|") + "#" + data.map(n => Math.round(n)).join(",");
    useEffect(() => {
      if(!ref.current || !window.Chart) return;
      if(inst.current){ inst.current.destroy(); inst.current = null; }
      inst.current = new Chart(ref.current, {
        type: "bar",
        data: { labels, datasets: [{ data, backgroundColor: AC, hoverBackgroundColor: "#cf7400", borderRadius: 4, maxBarThickness: horizontal ? 16 : 30 }] },
        options: {
          indexAxis: horizontal ? "y" : "x",
          responsive: true, maintainAspectRatio: false,
          animation: { duration: 350 },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => brl(Number(c.raw)) } } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 }, color: "#a59c8d", maxRotation: 0, autoSkip: true, maxTicksLimit: horizontal ? 6 : 16 } },
            y: { grid: { color: "#f3eee6" }, ticks: { font: { size: 10 }, color: "#a59c8d", autoSkip: !horizontal ? false : true } }
          }
        }
      });
      return () => { if(inst.current){ inst.current.destroy(); inst.current = null; } };
    }, [sig, horizontal]);
    return html`<div class="chartbox" style=${{ height: (height||230)+"px" }}><canvas ref=${ref}></canvas></div>`;
  }

        if(!fMeds.includes(med)) return;
        procs.forEach(p => {
          if(!pred(p.un, day)) return;
          const pm = procMap[p.proc] = procMap[p.proc] || {};
          pm[day] = (pm[day]||0) + p.valor;
        });
      });
      procEntities = Object.entries(procMap).map(([name, days]) => ({

        days: Object.entries(days).sort((a,b) => b[0].localeCompare(a[0])).map(([d,v]) => [d,v]),

          <tbody>
            ${medproc.slice(0,200).map((o,i) => html`<tr key=${i}><td>${o.medico}</td><td>${o.proc}</td><td class="num">${o.qtd.toLocaleString("pt-BR")}</td><td class="num">${brl(o.valor)}</td></tr>`)}
            <tr class="total"><td>Total</td><td></td><td class="num">${mpTotQ.toLocaleString("pt-BR")}</td><td class="num">${brl(mpTotV)}</td></tr>
          </tbody>
        </table>
        ${medproc.length>200 ? html`<div style=${{padding:"6px 14px 12px",fontSize:"11px",color:"#a59c8d"}}>Mostrando 200 de ${medproc.length} — use os filtros acima pra refinar.</div>` : null}
      </div>
    </>`;
  }
  const NOTAS = [
    { v:"1.6", tag:"Médicos", ico:"ti-search", txt:"Busca por texto no filtro de procedimentos. Digite qualquer parte do nome para encontrar rapidamente." },
    { v:"1.5", tag:"Médicos", ico:"ti-filter", txt:"Filtro de Procedimento no cabeçalho. Selecione um ou mais procedimentos e veja apenas os médicos que os realizaram." },
    { v:"1.4", tag:"Procedimentos", ico:"ti-filter", txt:"Filtro de Médico no cabeçalho. Ao selecionar, a lista exibe os procedimentos individuais realizados pelo médico escolhido." },
    { v:"1.3", tag:"Geral", ico:"ti-building-hospital", txt:"Filtro de Unidade com multi-seleção. É possível combinar mais de uma clínica na mesma visualização." },
    { v:"1.2", tag:"Destaques", ico:"ti-eye", txt:"Em Médicos, os principais procedimentos do profissional aparecem ao expandir o nome. Em Procedimentos, uma linha discreta lista os médicos ativos no período." },
    { v:"1.1", tag:"Médicos", ico:"ti-git-branch", txt:"Detalhamento em 3 níveis: clique no médico, depois no dia, para ver cada procedimento realizado com o valor correspondente." },
    { v:"1.0", tag:"Pacotes", ico:"ti-package", txt:"Aba Pacotes - Detalhado com vendas por solicitante e tabela cruzada de médico por procedimento." },
  ];
  function PatchNotes({ onClose }){
    return html`<div onClick=${onClose} style=${{position:"fixed",inset:0,background:"rgba(20,18,16,.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",backdropFilter:"blur(2px)"}}>
      <div onClick=${e => e.stopPropagation()} style=${{background:"#fff",borderRadius:"14px",boxShadow:"0 24px 64px rgba(0,0,0,.18)",width:"100%",maxWidth:"480px",maxHeight:"84vh",display:"flex",flexDirection:"column",overflow:"hidden",border:"1px solid #e3ded7"}}>
        <div style=${{padding:"18px 20px",borderBottom:"1px solid #eee6da",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"12px",flexShrink:0}}>
          <div style=${{display:"flex",alignItems:"center",gap:"12px"}}>
            <img src="robozinho.png" alt="bot" style=${{width:"42px",height:"42px",borderRadius:"10px",objectFit:"cover",flexShrink:0,border:"1px solid #eee6da"}} />
            <div>
              <div style=${{fontSize:"14.5px",fontWeight:600,color:"#2b2a28",letterSpacing:"-.01em"}}>Registro de Atualizações</div>
              <div style=${{fontSize:"11.5px",color:"#a59c8d",marginTop:"2px"}}>Aqui estão todas as melhorias do painel</div>
            </div>
          </div>
          <button onClick=${onClose} style=${{background:"none",border:"1px solid #e3ded7",cursor:"pointer",color:"#8a8378",fontSize:"18px",width:"30px",height:"30px",borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1,fontWeight:300,fontFamily:"sans-serif"}}>×</button>
        </div>
        <div style=${{overflowY:"auto",flex:1}}>
          ${NOTAS.map((n,i) => html`<div key=${i} style=${{padding:"14px 20px",borderBottom:"1px solid #f5f1ea",display:"flex",gap:"12px",alignItems:"flex-start"}}>
            <img src="robozinho.png" alt="bot" style=${{width:"32px",height:"32px",borderRadius:"8px",objectFit:"cover",flexShrink:0,marginTop:"1px",border:"1px solid #eee6da"}} />
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}}>
                <code style=${{fontSize:"10.5px",fontWeight:700,color:"#E8830F",background:"#fdf1e3",padding:"2px 7px",borderRadius:"5px",fontFamily:"monospace",letterSpacing:".02em"}}>v${n.v}</code>
                <span style=${{fontSize:"10.5px",fontWeight:600,color:"#a59c8d",textTransform:"uppercase",letterSpacing:".06em"}}>${n.tag}</span>
              </div>
              <div style=${{fontSize:"13px",color:"#4a443c",lineHeight:"1.6"}}>${n.txt}</div>
            </div>
          </div>`)}
        </div>
        <div style=${{padding:"11px 20px",borderTop:"1px solid #eee6da",flexShrink:0,background:"#fcfbf9",display:"flex",alignItems:"center",justifyContent:"center",gap:"7px"}}>
          <i class="ti ti-sun" style=${{fontSize:"14px",color:"#E8830F"}}></i>
          <span style=${{fontSize:"12px",color:"#8a8378"}}>Dados atualizados automaticamente todos os dias às 07h00</span>
        </div>
      </div>
    </div>`;
  }
  function Dashboard({ user, store, onLogout }){
    const [page, setPage] = useState("geral");
    const [showNotes, setShowNotes] = useState(false);
    const [unis, setUnis] = useState([]);
    const [fMeds, setFMeds] = useState([]);
    const [fProcs, setFProcs] = useState([]);
    const [pmode, setPmode] = useState("mes");
    const [months, setMonths] = useState(store.months.map(m => m[0]));
    const [de, setDe] = useState(store.dmin);
    const [ate, setAte] = useState(store.dmax);
    const [kpi, setKpi] = useState(null);
    const pred = buildPred(unis, pmode, months, de, ate);
    const daily = aggDaily(store, pred);
    const med = aggEntity(store.dm, pred);
    const grp = aggEntity(store.dg, pred);
    const pac = aggEntity(store.dp || {}, pred);
    const medOpts = [...new Set(Object.keys(store.dmd).map(k => k.split("||")[0]))].sort().map(m => [m, m]);
    const procOpts = Object.keys(store.dpg||{}).sort().map(p => [p, p]);
    const periodOk = d => pmode === "mes" ? months.includes(d.slice(0,7)) : (d >= de && d <= ate);
    const ini = (user.isMaster ? "D" : (user.unidade||"U")).replace("Skinlaser - ","").charAt(0).toUpperCase();
    useEffect(() => {
      let cancel = false; setKpi(null);
      const dias = periodDays(pmode, months, de, ate, store.calMin, store.calMax);
      const p_unidade = user.isMaster ? (unis.length === 1 ? store.units[unis[0]] : null) : user.unidade;
      sb.rpc("analitico_kpis", { p_unidade, p_dias: dias }).then(({ data, error }) => {
        if(cancel) return;
        const r = (!error && data && data[0]) ? data[0] : { valor_final:0, valor:0, qtd:0 };
        setKpi({ vf: Number(r.valor_final), valor: Number(r.valor), qtd: Number(r.qtd), dias: dias.length });
      });
      return () => { cancel = true; };
    }, [unis.join(","), pmode, months.join(","), de, ate]);
    const dchart = daily.slice().reverse();
    return html`<div>
      ${showNotes ? html`<${PatchNotes} onClose=${() => setShowNotes(false)} />` : null}
      <div class="hdr">
        <div class="hdr-l"><img class="logo" src="logo.png" alt="Skin Laser" /><b>Analítico por Unidade Médica e Procedimento</b></div>
        <div class="hdr-r"><button class=${"lo"+(showNotes?"":" lo-pulse")} onClick=${() => setShowNotes(true)} aria-label="Novidades" title="Ver novidades"><span class="inbox-ico"></span></button><span class="chip"><span class="av">${ini}</span>${user.isMaster ? "diretoria" : user.login}</span><button class="lo" onClick=${onLogout} aria-label="Sair"><i class="ti ti-logout"></i></button></div>
      </div>
      <div class="body">
        <div class="side">
          <div class="side-t">Páginas</div>
          <div class=${"nav"+(page==="geral"?" active":"")} onClick=${() => setPage("geral")}><i class="ti ti-layout-dashboard"></i>Análise Geral</div>
          <div class=${"nav"+(page==="med"?" active":"")} onClick=${() => setPage("med")}><i class="ti ti-stethoscope"></i>Médicos - Detalhado</div>
          <div class=${"nav"+(page==="proc"?" active":"")} onClick=${() => setPage("proc")}><i class="ti ti-clipboard-list"></i>Procedimentos - Detalhado</div>
          <div class=${"nav"+(page==="pac"?" active":"")} onClick=${() => setPage("pac")}><i class="ti ti-package"></i>Pacotes - Detalhado</div>
        </div>
        <div class="main">
          <${FilterBar} store=${store} user=${user} unis=${unis} setUnis=${setUnis} pmode=${pmode} setPmode=${setPmode} months=${months} setMonths=${setMonths} de=${de} setDe=${setDe} ate=${ate} setAte=${setAte} page=${page} fMeds=${fMeds} setFMeds=${setFMeds} medOpts=${medOpts} fProcs=${fProcs} setFProcs=${setFProcs} procOpts=${procOpts} />
          <div class="canvas">
        ${page==="geral" ? html`<${React.Fragment}>
          <${Kpis} kpi=${kpi} />
          <div class="visual">
            <div class="visual-h"><i class="ti ti-chart-bar"></i>Propostas executadas por dia</div>
            <${Chartjs} labels=${dchart.map(r=>ddmm(r[0]))} data=${dchart.map(r=>r[1])} height=${230} />
          </div>
          <div class="grid2">
            <${Matrix} title="Por profissional" icon="ti-stethoscope" entities=${med} nameHead="Profissional" />
            <${Matrix} title="Por grupo de procedimento" icon="ti-clipboard-list" entities=${grp} nameHead="Grupo" />
          </div>
          <${TotalTable} daily=${daily} />
        </>` : null}
        ${page==="med" ? html`<${MedicosDetailPage} entities=${med} dmd=${store.dmd} dmp=${store.dmp} unis=${unis} fProcs=${fProcs} periodOk=${periodOk} />` : null}
        ${page==="proc" ? html`<${ProcDetailPage} entities=${grp} dmd=${store.dmd} pred=${pred} fMeds=${fMeds} topMeds=${med} />` : null}
        ${page==="pac" ? html`<${PacotesPage} user=${user} store=${store} unis=${unis} pmode=${pmode} months=${months} de=${de} ate=${ate} />` : null}
          </div>
        </div>
      </div>
    </div>`;
  }
  function Login({ onLogin, err, busy }){
    const [u, setU] = useState(""); const [p, setP] = useState("");
    const go = () => { if(!busy && u.trim() && p) onLogin(u, p); };
    return html`<div class="gate"><div class="gate-card">
      <img class="logo" src="logo.png" alt="Skin Laser" />
      <p class="gate-sub">Analítico por Unidade Médica e Procedimento</p>
      <label>Login</label>
      <input type="text" value=${u} onChange=${e => setU(e.target.value)} onKeyDown=${e => e.key==="Enter" && go()} placeholder="ex.: morumbi" />
      <label>Senha</label>
      <input type="password" value=${p} onChange=${e => setP(e.target.value)} onKeyDown=${e => e.key==="Enter" && go()} placeholder="••••••" />
      <button class="btn" onClick=${go} disabled=${busy}>${busy ? "Entrando..." : "Entrar"}</button>
      <div class="err">${err}</div>
      <div class="hint">Use o login da sua unidade (ou diretoria)</div>
    </div></div>`;
  }
  function App(){
    const [user, setUser] = useState(null);
    const [store, setStore] = useState(null);
    const [err, setErr] = useState("");
    const [busy, setBusy] = useState(false);
    async function onLogin(login, pwd){
      setBusy(true); setErr("");
      try {
        const lg = login.trim().toLowerCase();
        const email = lg.includes("@") ? lg : lg + DOMINIO;
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if(error) throw new Error("Login ou senha inválidos.");
        const { data: m } = await sb.from("app_user_unidade").select("unidade_nome,is_master").eq("user_id", data.user.id).maybeSingle();
        if(!m) throw new Error("Usuário sem unidade vinculada (verifique o mapeamento).");
        const u = { login: lg, unidade: m.unidade_nome, isMaster: !!m.is_master };
        const s = await loadStore(u);
        setUser(u); setStore(s);
      } catch(e){ setErr(e.message || "Falha ao entrar."); }
      finally { setBusy(false); }
    }
    function logout(){ sb.auth.signOut(); setUser(null); setStore(null); setErr(""); }
    if(user && store) return html`<${Dashboard} user=${user} store=${store} onLogout=${logout} />`;
    return html`<${Login} onLogin=${onLogin} err=${err} busy=${busy} />`;
  }
  ReactDOM.createRoot(document.getElementById("pbx-root")).render(html`<${App} />`);
</script>
</body>
</html>
